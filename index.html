<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADMIN CARTA V 11.7 - ORDEN SEGURO</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primario: #e67e22; --fondo: #f4f7f6; --texto: #2c3e50; --verde: #27ae60; --rojo: #e74c3c; }
        body { font-family: 'Montserrat', sans-serif; background: var(--fondo); margin: 0; padding: 10px 5px 140px; color: var(--texto); }
        .container { width: 100%; max-width: 1200px; margin: 0 auto; }
        .header-admin { text-align: center; background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-bottom: 4px solid var(--primario); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #status-carga { font-size: 0.75rem; padding: 8px; border-radius: 5px; margin-bottom: 10px; font-weight: bold; text-align: center; }
        .status-ok { background: #d4edda; color: #155724; }
        .categoria-tarjeta { background: white; border-radius: 12px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .categoria-titulo { background: var(--primario); color: white; padding: 10px 15px; font-weight: 700; text-transform: uppercase; font-size: 0.8rem; }
        
        /* Estilos Base Plato (PC) */
        .plato-item { display: flex; padding: 12px; border-bottom: 1px solid #f1f2f6; gap: 10px; align-items: center; }
        .plato-info { flex: 1; min-width: 0; }
        .plato-nombre { font-weight: 600; font-size: 0.9rem; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        /* Contenedor de controles (PC) - Corregido para que no desaparezca el check */
        .plato-meta-footer { display: flex; align-items: center; gap: 15px; flex-shrink: 0; min-width: 180px; justify-content: flex-end; }
        .meta-left { display: flex; align-items: center; gap: 5px; }
        .meta-right { display: flex; align-items: center; gap: 15px; }
        
        .plato-orden-btns { display: flex; flex-direction: column; gap: 4px; width: 35px; }

        /* MODIFICACIÓN MÓVIL */
        @media (max-width: 600px) {
            .plato-item { 
                display: grid; 
                grid-template-columns: 40px 1fr; 
                grid-template-rows: auto auto;
                align-items: center; 
                gap: 4px 12px; 
                padding: 12px; 
            }
            
            .plato-orden-btns { 
                grid-column: 1; 
                grid-row: 1 / span 2; 
                display: flex; 
                flex-direction: column; 
                justify-content: center;
                gap: 4px; 
            }
            
            .btn-orden { padding: 6px 0; font-size: 0.85rem; width: 100%; }

            .plato-info { 
                grid-column: 2; 
                grid-row: 1; 
            }
            
            .plato-nombre { 
                font-size: 0.95rem; 
                line-height: 1.2; 
                display: -webkit-box;
                -webkit-line-clamp: 2; 
                -webkit-box-orient: vertical;
                overflow: hidden;
                margin: 0;
                padding-right: 10px;
                white-space: normal; /* Permite salto de línea en móvil */
            }
            
            .plato-meta-footer { 
                grid-column: 2; 
                grid-row: 2; 
                display: flex; 
                align-items: center; 
                justify-content: space-between; 
                width: 100%;
                gap: 0;
                min-width: 0; /* Reset para el grid móvil */
            }

            .meta-left { display: flex; align-items: center; gap: 5px; }
            .meta-right { display: flex; align-items: center; gap: 15px; }
            
            .btn-config { padding: 4px 8px; font-size: 0.9rem; }
        }

        .btn-config { background: #f8f9fa; border: 1px solid #ddd; border-radius: 6px; padding: 8px; cursor: pointer; }
        .btn-orden { background: #fff; border: 1px solid #ccc; border-radius: 4px; padding: 5px 8px; cursor: pointer; font-size: 1rem; }
        .btn-add-float { position: fixed; bottom: 85px; right: 20px; width: 60px; height: 60px; background: var(--primario); color: white; border-radius: 50%; border: none; font-size: 35px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1000; cursor: pointer; }
        .btn-guardar-main { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2c3e50; color: white; padding: 18px; border-radius: 50px; border: none; font-weight: 700; width: 90%; max-width: 450px; z-index: 1000; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(6px); overflow-y: auto; }
        .modal-content { background: white; width: 96%; max-width: 1000px; margin: 15px auto; border-radius: 15px; padding: 25px; box-sizing: border-box; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--primario); text-transform: uppercase; margin-bottom: 8px; }
        .input-row-lang { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; }
        .lang-tag { background: #34495e; color: white; font-weight: 700; font-size: 0.7rem; width: 40px; padding: 12px 0; text-align: center; border-radius: 8px; flex-shrink: 0; }
        .input-estandar { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-family: 'Montserrat'; font-size: 1rem; width: 100%; box-sizing: border-box; }
        textarea.input-estandar { min-height: 60px; resize: vertical; line-height: 1.4; }
        .meta-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 700px) { .meta-grid { grid-template-columns: 1fr 2fr; } }
        .alergenos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
        .alergeno-btn { border: 1px solid #ddd; border-radius: 6px; padding: 10px; font-size: 0.7rem; text-align: center; cursor: pointer; background: #fff; font-weight: 600; }
        .alergeno-btn.selected { background: var(--primario); color: white; border-color: var(--primario); }
        .alergeno-btn.selected.es-dieta { background: var(--verde) !important; border-color: var(--verde) !important; }
        .switch { position: relative; width: 44px; height: 22px; flex-shrink: 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--verde); }
        input:checked + .slider:before { transform: translateX(22px); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-admin">
        <h1>⚙️ GESTOR DE CARTA V 11.7</h1>
        <div id="status-carga">Cargando datos...</div>
    </div>
    <div id="editor-dinamico"></div>
</div>

<button class="btn-add-float" onclick="abrirSelector()">+</button>
<button class="btn-guardar-main" onclick="enviarAlExcel()">💾 GUARDAR Y REORDENAR EXCEL</button>

<div id="modal-editor" class="modal">
    <div class="modal-content">
        <h2 id="modal-titulo" style="margin-top:0; color:var(--primario); border-bottom: 2px solid #eee; padding-bottom: 10px;">Editar Plato</h2>
        <div class="input-group">
            <label>Nombres</label>
            <div class="input-row-lang"><div class="lang-tag">ES</div><textarea id="edit-es" class="input-estandar"></textarea></div>
            <div class="input-row-lang"><div class="lang-tag">EN</div><textarea id="edit-en" class="input-estandar"></textarea></div>
            <div class="input-row-lang"><div class="lang-tag">DE</div><textarea id="edit-de" class="input-estandar"></textarea></div>
            <div class="input-row-lang"><div class="lang-tag">FR</div><textarea id="edit-fr" class="input-estandar"></textarea></div>
            <div class="input-row-lang"><div class="lang-tag">IT</div><textarea id="edit-it" class="input-estandar"></textarea></div>
        </div>
        <div class="meta-grid">
            <div class="input-group">
                <label>Precio (€)</label>
                <input type="number" id="edit-precio" class="input-estandar" step="0.01" oninput="if(this.value.includes('.')){ if(this.value.split('.')[1].length > 2) this.value = this.value.slice(0, -1); }">
            </div>
            <div class="input-group">
                <label>Imagen</label>
                <input type="text" id="edit-imagen" class="input-estandar" placeholder="plato01.webp">
            </div>
        </div>
        <div class="input-group">
            <label>Alérgenos y Dietas</label>
            <div id="alergenos-grid" class="alergenos-grid"></div>
        </div>
        <div style="margin-top: 30px; display: flex; gap: 10px;">
            <button onclick="aplicarCambiosPlato()" style="flex:2; background:var(--verde); color:white; padding:18px; border:none; border-radius:12px; font-weight:700; cursor:pointer;">ACEPTAR</button>
            <button onclick="cerrarModal('modal-editor')" style="flex:1; background:#eee; padding:18px; border:none; border-radius:12px; font-weight:600; cursor:pointer;">CANCELAR</button>
        </div>
    </div>
</div>

<div id="modal-selector" class="modal">
    <div class="modal-content" style="max-width: 500px;">
        <h3 style="text-align:center; color:var(--primario);">AÑADIR NUEVO PLATO A...</h3>
        <div id="lista-agrupada" style="max-height: 65vh; overflow-y: auto;"></div>
        <button onclick="cerrarModal('modal-selector')" style="width:100%; margin-top:15px; padding:15px; border:none; background:#eee; border-radius:10px; font-weight:bold;">CERRAR</button>
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSMhPbZuQWubawpjneIaAwSkxqFw-3LcmVw5xBuU_kxjMHpT1Sa8N7aZq9yxU4DZBawr4qNQmWlMnOy/pub?gid=0&single=true&output=csv';
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxHl0RK3OaZkgp7wvhT5XIWPbuCrKWH6dv1lSRi9Sq-fN4au1M5anRS14dg9M1K6r0/exec';
    
    let datosLocales = [];
    let platoEditandoId = null;
    let esNuevoPlato = false; 
    let datosTempNuevo = null; 

    const ALERGENOS_LISTA = ["GLUTEN", "SESAMO", "CACAHUETE", "SOJA", "FRUTOSCASCARA", "APIO", "HUEVO", "PESCADO", "MOSTAZA", "MOLUSCO", "SULFITOS", "LACTOSA", "ALTRAMUCES", "CRUSTACEO", "VEGANO", "VEGETARIANO"];

    const ESTRUCTURA = [
        { id: 12000, name: "Sugerencias", sub: [{id: 12100, name: "Croquetas", folder: "entrantes", img: "croquetas01.webp"},{id: 12200, name: "Croquetas Veg.", folder: "entrantes", img: "croquetasvegetarianas01.webp"},{id: 12300, name: "Entrantes", folder: "entrantes"},{id: 12400, name: "Pasta", folder: "pasta"},{id: 12500, name: "Arroz", folder: "arroz"},{id: 12700, name: "Pescado", folder: "pescado"},{id: 12800, name: "Carne", folder: "carne"},{id: 12900, name: "Postres", folder: "postres"}]},
        { id: 1000, name: "1- Entrantes", sub: [{id: 1000, name: "Entrantes", folder: "entrantes"},{id: 1100, name: "Pan", folder: "entrantes"}]},
        { id: 2000, name: "2- Ensaladas", sub: [{id: 2000, name: "Clasicas", folder: "ensaladas"},{id: 2100, name: "Pokes", folder: "ensaladas"},{id: 2200, name: "Otras", folder: "ensaladas"}]},
        { id: 3000, name: "3- Arroz y Pasta", sub: [{id: 3000, name: "Risotto", folder: "arroz"},{id: 3100, name: "Arroz", folder: "arroz"},{id: 3200, name: "Fideuá", folder: "pasta"},{id: 3300, name: "Pasta", folder: "pasta"}]},
        { id: 4000, name: "4- Recetas", sub: [{id: 4000, name: "Pescado", folder: "pescado"},{id: 4100, name: "Carne", folder: "carne"}]},
        { id: 5000, name: "5- Platos principales", sub: [{id: 5000, name: "Pescado", folder: "pescado"},{id: 5100, name: "Carne", folder: "carne"}]},
        { id: 6000, name: "6- Guarniciones", sub: [{id: 6000, name: "Guarnición", folder: "guarnicion"},{id: 6100, name: "Extra", folder: "guarnicion"}]},
        { id: 7000, name: "7- Platos niño", folder: "niños" },
        { id: 8000, name: "8- Postres", folder: "postres" },
        { id: 9000, name: "9- Cafés", sub: [{id: 9000, name: "Cafés", folder: "cafe"},{id: 9100, name: "Infusiones", folder: "cafe"}]},
        { id: 10000, name: "10- Bebidas", sub: [{id: 10000, name: "Refrescos", folder: "refrescos"},{id: 10100, name: "Zumos", folder: "refrescos"},{id: 10200, name: "Otros", folder: "refrescos"}]},
        { id: 11000, name: "11- Cervezas", folder: "cerveza" }
    ];

    function superLimpiar(texto) {
        if (!texto) return "";
        let t = texto.toString().trim();
        if (t.startsWith('"') && t.endsWith('"')) t = t.substring(1, t.length - 1);
        t = t.replace(/""/g, '"');
        return t.trim();
    }

    async function cargar() {
        try {
            const resp = await fetch(CSV_URL + '&cache=' + Date.now());
            const text = await resp.text();
            const filas = text.split(/\r?\n/).filter(f => f.trim() !== "");
            datosLocales = [];
            filas.forEach((f, i) => {
                if (i === 0) return;
                const c = f.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const id = parseInt(c[0]);
                if (!isNaN(id)) {
                    datosLocales.push({
                        id: id, precio: c[1]||"0.00", activa: (c[2]||"").toLowerCase().includes("si"),
                        es: superLimpiar(c[3]), carpeta: c[4]||"", imagen: c[5]||"",
                        alergenos: superLimpiar(c[6]), en: superLimpiar(c[7]), 
                        de: superLimpiar(c[8]), fr: superLimpiar(c[9]), it: superLimpiar(c[10])
                    });
                }
            });
            document.getElementById('status-carga').innerText = "✅ Datos Sincronizados";
            document.getElementById('status-carga').className = "status-ok";
            renderizar();
            generarMenuAgrupado();
        } catch (e) { document.getElementById('status-carga').innerText = "❌ Error al cargar CSV"; }
    }

    function renderizar() {
        let h = "";
        datosLocales.sort((a,b)=>a.id-b.id);
        ESTRUCTURA.forEach(cat => {
            const platos = datosLocales.filter(p => p.id >= cat.id && p.id <= cat.id + 999);
            if (platos.length === 0) return;
            h += `<div class="categoria-tarjeta"><div class="categoria-titulo">${cat.name}</div>`;
            platos.forEach((p) => {
                h += `<div class="plato-item">
                    <div class="plato-orden-btns">
                        <button class="btn-orden" onclick="moverPlato(${p.id}, 'subir')">▲</button>
                        <button class="btn-orden" onclick="moverPlato(${p.id}, 'bajar')">▼</button>
                    </div>
                    <div class="plato-info">
                        <span class="plato-nombre">${p.es}</span>
                    </div>
                    <div class="plato-meta-footer">
                        <div class="meta-left">
                            <small style="color:#888; font-weight:600;">ID ${p.id} | ${p.precio}€</small>
                        </div>
                        <div class="meta-right">
                            <button class="btn-config" onclick="abrirEditor(${p.id})">⚙️</button>
                            <label class="switch"><input type="checkbox" ${p.activa?'checked':''} onchange="toggleActivo(${p.id},this.checked)"><span class="slider"></span></label>
                        </div>
                    </div>
                </div>`;
            });
            h += `</div>`;
        });
        document.getElementById('editor-dinamico').innerHTML = h;
    }

    function moverPlato(id, direccion) {
        datosLocales.sort((a, b) => a.id - b.id);
        const idx = datosLocales.findIndex(x => x.id === id);
        const pActual = datosLocales[idx];
        let pVecino = null;
        if (direccion === 'subir' && idx > 0) { pVecino = datosLocales[idx - 1]; } 
        else if (direccion === 'bajar' && idx < datosLocales.length - 1) { pVecino = datosLocales[idx + 1]; }
        if (pVecino && pActual.id >= 0 && pVecino.id >= 0) {
            const tempId = pActual.id;
            pActual.id = pVecino.id;
            pVecino.id = tempId;
            renderizar();
        }
    }

    function abrirEditor(id, esNuevo = false) {
        let p;
        if(esNuevo) { p = datosTempNuevo; esNuevoPlato = true; } 
        else { p = datosLocales.find(x => x.id === id); esNuevoPlato = false; }
        platoEditandoId = id;
        document.getElementById('edit-es').value = p.es;
        document.getElementById('edit-en').value = p.en;
        document.getElementById('edit-de').value = p.de;
        document.getElementById('edit-fr').value = p.fr;
        document.getElementById('edit-it').value = p.it;
        document.getElementById('edit-precio').value = p.precio;
        document.getElementById('edit-imagen').value = p.imagen;
        const actuales = p.alergenos.split(',').map(s => s.trim().toUpperCase()).filter(s => s !== "");
        document.getElementById('alergenos-grid').innerHTML = ALERGENOS_LISTA.map(a => {
            const sel = actuales.includes(a) ? 'selected' : '';
            const esDieta = (a === "VEGANO" || a === "VEGETARIANO") ? "es-dieta" : "";
            return `<div class="alergeno-btn ${sel} ${esDieta}" onclick="this.classList.toggle('selected')">${a}</div>`;
        }).join('');
        document.getElementById('modal-editor').style.display = 'block';
    }

    function aplicarCambiosPlato() {
        let p;
        if (esNuevoPlato) {
            p = datosTempNuevo;
            datosLocales.push(p);
            esNuevoPlato = false;
        } else {
            p = datosLocales.find(x => x.id === platoEditandoId);
        }
        p.es = superLimpiar(document.getElementById('edit-es').value);
        p.en = superLimpiar(document.getElementById('edit-en').value);
        p.de = superLimpiar(document.getElementById('edit-de').value);
        p.fr = superLimpiar(document.getElementById('edit-fr').value);
        p.it = superLimpiar(document.getElementById('edit-it').value);
        p.precio = parseFloat(document.getElementById('edit-precio').value || 0).toFixed(2);
        p.imagen = superLimpiar(document.getElementById('edit-imagen').value);
        p.alergenos = Array.from(document.querySelectorAll('.alergeno-btn.selected')).map(el => el.innerText.trim()).join(', ');
        cerrarModal('modal-editor'); 
        renderizar();
    }

    function generarMenuAgrupado() {
        let h = "";
        ESTRUCTURA.forEach(cat => {
            h += `<div style="margin-bottom:10px; border:1px solid #ddd; border-radius:8px; overflow:hidden;"><div style="background:#f8f9fa; padding:8px; font-size:0.7rem; font-weight:700;">${cat.name}</div>`;
            if (cat.sub) {
                cat.sub.forEach(s => { h += `<button onclick="prepararNuevoPlato(${s.id})" style="width:100%; text-align:left; padding:12px; border:none; border-bottom:1px solid #f1f1f1; background:white; font-size:0.85rem; cursor:pointer;">+ Añadir en ${s.name}</button>`; });
            } else { h += `<button onclick="prepararNuevoPlato(${cat.id})" style="width:100%; text-align:left; padding:12px; border:none; background:white; font-size:0.85rem; cursor:pointer;">+ Añadir en ${cat.name}</button>`; }
            h += `</div>`;
        });
        document.getElementById('lista-agrupada').innerHTML = h;
    }

    function prepararNuevoPlato(baseId) {
        const similares = datosLocales.filter(p => p.id >= baseId && p.id <= baseId + 99);
        const nuevoId = similares.length > 0 ? Math.max(...similares.map(p => p.id)) + 1 : baseId;
        let carpetaAsignada = "";
        let imagenAsignada = "";
        for (const cat of ESTRUCTURA) {
            if (cat.sub) {
                const subEncontrada = cat.sub.find(s => s.id === baseId);
                if (subEncontrada) { carpetaAsignada = subEncontrada.folder || ""; imagenAsignada = subEncontrada.img || ""; break; }
            } else if (cat.id === baseId) { carpetaAsignada = cat.folder || ""; break; }
        }
        datosTempNuevo = { 
            id: nuevoId, precio: "0.00", activa: true, es: "NUEVO PLATO", 
            carpeta: carpetaAsignada, imagen: imagenAsignada, alergenos: "", en:"", de:"", fr:"", it:"" 
        };
        cerrarModal('modal-selector');
        abrirEditor(nuevoId, true);
    }

    async function enviarAlExcel() {
        const btn = document.querySelector('.btn-guardar-main');
        btn.innerText = "⏳ SUBIENDO..."; btn.disabled = true;
        datosLocales.sort((a, b) => a.id - b.id);
        const payload = datosLocales.map(p => ({
            id: p.id, precio: p.precio, estado: p.activa ? 'si' : 'no', 
            nombre_es: p.es, carpeta: p.carpeta, imagen: p.imagen, alergenos: p.alergenos,
            nombre_en: p.en, nombre_de: p.de, nombre_fr: p.fr, nombre_it: p.it
        }));
        try {
            await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("✅ Cambios enviados. En unos segundos se verá en la carta.");
            location.reload();
        } catch (e) { 
            alert("Error al conectar"); 
            btn.disabled = false; btn.innerText = "💾 GUARDAR Y REORDENAR EXCEL"; 
        }
    }

    function toggleActivo(id, v) { datosLocales.find(x => x.id === id).activa = v; }
    function abrirSelector() { document.getElementById('modal-selector').style.display = 'block'; }
    function cerrarModal(id) { 
        document.getElementById(id).style.display = 'none'; 
        if(id === 'modal-editor') { esNuevoPlato = false; datosTempNuevo = null; }
    }
    cargar();
</script>
</body>
</html>

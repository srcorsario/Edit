<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADMIN CARTA V 12.2 - WINE SYNC</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primario: #e67e22; --fondo: #f4f7f6; --texto: #2c3e50; --verde: #27ae60; --rojo: #e74c3c; }
        body { font-family: 'Montserrat', sans-serif; background: var(--fondo); margin: 0; padding: 10px 5px 140px; color: var(--texto); }
        .container { width: 100%; max-width: 1200px; margin: 0 auto; }
        .header-admin { text-align: center; background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-bottom: 4px solid var(--primario); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #status-carga { font-size: 0.75rem; padding: 8px; border-radius: 5px; margin-bottom: 10px; font-weight: bold; text-align: center; }
        .status-ok { background: #d4edda; color: #155724; }
        .categoria-tarjeta { background: white; border-radius: 12px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .categoria-titulo { background: var(--primario); color: white; padding: 10px 15px; font-weight: 700; text-transform: uppercase; font-size: 0.8rem; }
        .plato-item { display: flex; padding: 12px; border-bottom: 1px solid #f1f2f6; gap: 10px; align-items: center; }
        .plato-info { flex: 1; min-width: 0; }
        .plato-nombre { font-weight: 600; font-size: 0.9rem; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .info-pc-extra { font-size: 0.7rem; color: #7f8c8d; margin-top: 4px; display: flex; gap: 10px; align-items: center; }
        .tag-carpeta { background: #ebf2f7; padding: 2px 6px; border-radius: 4px; color: #2980b9; font-weight: bold; }
        .tag-imagen { color: #27ae60; display: flex; align-items: center; gap: 3px; }
        .plato-meta-footer { display: flex; align-items: center; gap: 15px; flex-shrink: 0; min-width: 180px; justify-content: flex-end; }
        .meta-left { display: flex; align-items: center; gap: 5px; }
        .meta-right { display: flex; align-items: center; gap: 15px; }
        .plato-orden-btns { display: flex; flex-direction: column; gap: 4px; width: 35px; }
        @media (max-width: 600px) {
            .info-pc-extra { display: none; } 
            .plato-item { display: grid; grid-template-columns: 40px 1fr; grid-template-rows: auto auto; align-items: center; gap: 4px 12px; padding: 12px; }
            .plato-orden-btns { grid-column: 1; grid-row: 1 / span 2; display: flex; flex-direction: column; justify-content: center; gap: 4px; }
            .btn-orden { padding: 6px 0; font-size: 0.85rem; width: 100%; }
            .plato-info { grid-column: 2; grid-row: 1; }
            .plato-nombre { font-size: 0.95rem; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin: 0; padding-right: 10px; white-space: normal; }
            .plato-meta-footer { grid-column: 2; grid-row: 2; display: flex; align-items: center; justify-content: space-between; width: 100%; gap: 5px; min-width: 0; }
            .meta-left { display: flex; align-items: center; gap: 5px; flex: 0 1 auto; white-space: nowrap; }
            .meta-right { display: flex; align-items: center; gap: 8px; flex: 0 0 auto; justify-content: flex-end; }
        }
        .btn-config { background: #f8f9fa; border: 1px solid #ddd; border-radius: 6px; padding: 8px; cursor: pointer; }
        .btn-orden { background: #fff; border: 1px solid #ccc; border-radius: 4px; padding: 5px 8px; cursor: pointer; font-size: 1rem; }
        .btn-add-float { position: fixed; bottom: 85px; right: 20px; width: 60px; height: 60px; background: var(--primario); color: white; border-radius: 50%; border: none; font-size: 35px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1000; cursor: pointer; }
        .btn-guardar-main { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2c3e50; color: white; padding: 18px; border-radius: 50px; border: none; font-weight: 700; width: 90%; max-width: 450px; z-index: 1000; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(6px); overflow-y: auto; }
        .modal-content { background: white; width: 96%; max-width: 1000px; margin: 15px auto; border-radius: 15px; padding: 25px; box-sizing: border-box; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--primario); text-transform: uppercase; margin-bottom: 8px; }
        .input-row-lang { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; }
        .lang-tag { background: #34495e; color: white; font-weight: 700; font-size: 0.7rem; width: 40px; padding: 12px 0; text-align: center; border-radius: 8px; flex-shrink: 0; }
        .input-estandar { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-family: 'Montserrat'; font-size: 1rem; width: 100%; box-sizing: border-box; }
        .input-uvas { background: #fff9f4; border: 1px dashed var(--primario); margin-top: 5px; font-size: 0.85rem; }
        .meta-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 700px) { .meta-grid { grid-template-columns: 1fr 2fr; } }
        .alergenos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
        .alergeno-btn { border: 1px solid #ddd; border-radius: 6px; padding: 10px; font-size: 0.7rem; text-align: center; cursor: pointer; background: #fff; font-weight: 600; }
        .alergeno-btn.selected { background: var(--primario); color: white; border-color: var(--primario); }
        .switch { position: relative; width: 44px; height: 22px; flex-shrink: 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--verde); }
        input:checked + .slider:before { transform: translateX(22px); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-admin">
        <h1>⚙️ GESTOR DE CARTA V 12.2</h1>
        <div id="status-carga">Cargando datos...</div>
    </div>
    <div id="editor-dinamico"></div>
</div>

<button class="btn-add-float" onclick="abrirSelector()">+</button>
<button class="btn-guardar-main" onclick="enviarAlExcel()">💾 GUARDAR Y REORDENAR EXCEL</button>

<div id="modal-editor" class="modal">
    <div class="modal-content">
        <h2 id="modal-titulo" style="margin-top:0; color:var(--primario); border-bottom: 2px solid #eee; padding-bottom: 10px;">Editar Elemento</h2>
        <div class="input-group">
            <label id="label-uvas">Nombres y Detalles</label>
            <div class="input-row-lang">
                <div class="lang-tag">ES</div>
                <div style="flex:1">
                    <input id="edit-es" class="input-estandar" placeholder="Nombre">
                    <input id="edit-es-uvas" class="input-estandar input-uvas" placeholder="Uvas / Detalles (Opcional)">
                </div>
            </div>
            <div class="input-row-lang">
                <div class="lang-tag">EN</div>
                <div style="flex:1">
                    <input id="edit-en" class="input-estandar" placeholder="Name">
                    <input id="edit-en-uvas" class="input-estandar input-uvas" placeholder="Grapes / Details (Optional)">
                </div>
            </div>
            <div class="input-row-lang">
                <div class="lang-tag">DE</div>
                <div style="flex:1">
                    <input id="edit-de" class="input-estandar" placeholder="Name">
                    <input id="edit-de-uvas" class="input-estandar input-uvas" placeholder="Rebsorten (Optional)">
                </div>
            </div>
            <div class="input-row-lang">
                <div class="lang-tag">FR</div>
                <div style="flex:1">
                    <input id="edit-fr" class="input-estandar" placeholder="Nom">
                    <input id="edit-fr-uvas" class="input-estandar input-uvas" placeholder="Cépages (Optionnel)">
                </div>
            </div>
            <div class="input-row-lang">
                <div class="lang-tag">IT</div>
                <div style="flex:1">
                    <input id="edit-it" class="input-estandar" placeholder="Nome">
                    <input id="edit-it-uvas" class="input-estandar input-uvas" placeholder="Vitigni (Opzionale)">
                </div>
            </div>
        </div>
        <div class="meta-grid">
            <div class="input-group">
                <label>Precio (€)</label>
                <input type="number" id="edit-precio" class="input-estandar" step="0.01">
            </div>
            <div class="input-group">
                <label>Imagen</label>
                <input type="text" id="edit-imagen" class="input-estandar" placeholder="plato01.webp">
            </div>
        </div>
        <div class="input-group">
            <label>Alérgenos y Dietas</label>
            <div id="alergenos-grid" class="alergenos-grid"></div>
        </div>
        <div style="margin-top: 30px; display: flex; gap: 10px;">
            <button onclick="aplicarCambiosPlato()" style="flex:2; background:var(--verde); color:white; padding:18px; border:none; border-radius:12px; font-weight:700; cursor:pointer;">ACEPTAR</button>
            <button onclick="cerrarModal('modal-editor')" style="flex:1; background:#eee; padding:18px; border:none; border-radius:12px; font-weight:600; cursor:pointer;">CANCELAR</button>
        </div>
    </div>
</div>

<div id="modal-selector" class="modal">
    <div class="modal-content" style="max-width: 500px;">
        <h3 style="text-align:center; color:var(--primario);">AÑADIR NUEVO A...</h3>
        <div id="lista-agrupada" style="max-height: 65vh; overflow-y: auto;"></div>
        <button onclick="cerrarModal('modal-selector')" style="width:100%; margin-top:15px; padding:15px; border:none; background:#eee; border-radius:10px; font-weight:bold;">CERRAR</button>
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT9rPlxpax2lE0rN97c6Hoy_OxUwREqRb48juEBr9C91ZFY2UvaKgC8JdiRcwDrtBErXFVmFRh0Zr5e/pub?gid=0&single=true&output=csv';
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbz2wu6B0m-QWZLqDRXhWcONg0Lta3uhTDOXq1lly43p5XKC7uvReeT6HcfC8K0LTLusTA/exec';

    let datosLocales = [];
    let platoEditandoId = null;
    let esNuevoPlato = false; 
    let datosTempNuevo = null; 

    const ALERGENOS_LISTA = ["GLUTEN", "SESAMO", "CACAHUETE", "SOJA", "FRUTOSCASCARA", "APIO", "HUEVO", "PESCADO", "MOSTAZA", "MOLUSCO", "SULFITOS", "LACTOSA", "ALTRAMUCES", "CRUSTACEO", "VEGANO", "VEGETARIANO"];

    const ESTRUCTURA = [
        { id: 12000, name: "Sugerencias", rango: 999, sub: [{id: 12100, name: "Croquetas", folder: "entrantes"},{id: 12200, name: "Croquetas Veg.", folder: "entrantes"},{id: 12300, name: "Entrantes", folder: "entrantes"},{id: 12400, name: "Pasta", folder: "pasta"},{id: 12500, name: "Arroz", folder: "arroz"},{id: 12700, name: "Pescado", folder: "pescado"},{id: 12800, name: "Carne", folder: "carne"},{id: 12900, name: "Postres", folder: "postres"}]},
        { id: 1000, name: "1- Entrantes", rango: 999, sub: [{id: 1000, name: "Entrantes", folder: "entrantes"},{id: 1100, name: "Pan", folder: "entrantes"}]},
        { id: 2000, name: "2- Ensaladas", rango: 999, sub: [{id: 2000, name: "Clasicas", folder: "ensaladas"},{id: 2100, name: "Pokes", folder: "ensaladas"},{id: 2200, name: "Otras", folder: "ensaladas"}]},
        { id: 3000, name: "3- Arroz y Pasta", rango: 999, sub: [{id: 3000, name: "Risotto", folder: "arroz"},{id: 3100, name: "Arroz", folder: "arroz"},{id: 3200, name: "Fideuá", folder: "pasta"},{id: 3300, name: "Pasta", folder: "pasta"}]},
        { id: 4000, name: "4- Recetas", rango: 999, sub: [{id: 4000, name: "Pescado", folder: "pescado"},{id: 4100, name: "Carne", folder: "carne"}]},
        { id: 5000, name: "5- Platos principales", rango: 999, sub: [{id: 5000, name: "Pescado", folder: "pescado"},{id: 5100, name: "Carne", folder: "carne"}]},
        { id: 6000, name: "6- Guarniciones", rango: 999, sub: [{id: 6000, name: "Guarnición", folder: "guarnicion"},{id: 6100, name: "Extra", folder: "guarnicion"}]},
        { id: 7000, name: "7- Platos niño", rango: 999, folder: "niños" },
        { id: 8000, name: "8- Postres", rango: 999, folder: "postres" },
        { id: 9000, name: "9- Cafés", rango: 999, sub: [{id: 9000, name: "Cafés", folder: "cafe"},{id: 9100, name: "Infusiones", folder: "cafe"}]},
        { id: 10000, name: "10- Bebidas", rango: 999, sub: [{id: 10000, name: "Refrescos", folder: "refrescos"},{id: 10100, name: "Zumos", folder: "refrescos"},{id: 10200, name: "Otros", folder: "refrescos"}]},
        { id: 11000, name: "11- Cervezas", rango: 999, folder: "cerveza" },
        
        // VINOS BLANCOS (13100-13199)
        { id: 13100, name: "13.1- Vinos Blancos", rango: 99, sub: [
            {id: 13100, name: "Mallorca", folder: "vinos", max: 13129},
            {id: 13130, name: "Galicia", folder: "vinos", max: 13139},
            {id: 13140, name: "Rueda", folder: "vinos", max: 13149},
            {id: 13150, name: "Otras D.O.", folder: "vinos", max: 13189},
            {id: 13190, name: "Copas", folder: "vinos", max: 13199}
        ]},
        // VINOS ROSADOS (13200-13299)
        { id: 13200, name: "13.2- Vinos Rosados", rango: 99, sub: [
            {id: 13200, name: "Vinos Rosados", folder: "vinos", max: 13249},
            {id: 13250, name: "Copas", folder: "vinos", max: 13259}
        ]},
        // VINOS TINTOS (13300-13400)
        { id: 13300, name: "13.3- Vinos Tintos", rango: 100, sub: [
            {id: 13300, name: "Mallorca", folder: "vinos", max: 13329},
            {id: 13330, name: "Rioja", folder: "vinos", max: 13349},
            {id: 13350, name: "Ribera", folder: "vinos", max: 13369},
            {id: 13370, name: "Otras D.O.", folder: "vinos", max: 13389},
            {id: 13390, name: "Copas", folder: "vinos", max: 13399}
        ]},
        // CAVA Y CHAMPAGNE (13400-14499)
        { id: 13400, name: "13.4- Cavas & Champagne", rango: 1099, sub: [
            {id: 13400, name: "Botellas", folder: "vinos", max: 13449},
            {id: 13450, name: "Copas", folder: "vinos", max: 13459}
        ]}
    ];

    function superLimpiar(texto) {
        if (!texto) return "";
        let t = texto.toString().trim();
        if (t.startsWith('"') && t.endsWith('"')) t = t.substring(1, t.length - 1);
        t = t.replace(/""/g, '"');
        return t.trim();
    }

    function desglosarNombre(texto) {
        if (!texto) return { nombre: "", uvas: "" };
        const partes = texto.split('//');
        return {
            nombre: partes[0] ? partes[0].trim() : "",
            uvas: partes[1] ? partes[1].trim() : ""
        };
    }

    async function cargar() {
        try {
            const resp = await fetch(CSV_URL + '&t=' + Date.now());
            const text = await resp.text();
            const filas = text.split(/\r?\n/).filter(f => f.trim() !== "");
            datosLocales = [];
            filas.forEach((f, i) => {
                if (i === 0) return;
                const c = f.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const id = parseInt(c[0]);
                if (!isNaN(id)) {
                    datosLocales.push({
                        id: id, precio: c[1]||"0.00", 
                        activa: (c[2]||"").trim().toUpperCase() === "SI",
                        es: superLimpiar(c[3]), carpeta: c[4]||"", imagen: c[5]||"",
                        alergenos: superLimpiar(c[6]), en: superLimpiar(c[7]), 
                        de: superLimpiar(c[8]), fr: superLimpiar(c[9]), it: superLimpiar(c[10])
                    });
                }
            });
            document.getElementById('status-carga').innerText = "✅ Datos Sincronizados";
            document.getElementById('status-carga').className = "status-ok";
            renderizar();
            generarMenuAgrupado();
        } catch (e) { document.getElementById('status-carga').innerText = "❌ Error al cargar"; }
    }

    function renderizar() {
        let h = "";
        datosLocales.sort((a,b)=>a.id-b.id);
        ESTRUCTURA.forEach(cat => {
            const platos = datosLocales.filter(p => p.id >= cat.id && p.id <= (cat.id + cat.rango));
            if (platos.length === 0) return;
            h += `<div class="categoria-tarjeta"><div class="categoria-titulo">${cat.name}</div>`;
            platos.forEach((p) => {
                let htmlImagenPC = p.imagen ? `<span class="tag-imagen">📷 ${p.imagen}</span>` : "";
                let htmlCarpetaPC = p.carpeta ? `<span class="tag-carpeta">${p.carpeta}</span>` : "";
                const nombreLimpio = desglosarNombre(p.es).nombre;
                h += `<div class="plato-item">
                    <div class="plato-orden-btns">
                        <button class="btn-orden" onclick="moverPlato(${p.id}, 'subir')">▲</button>
                        <button class="btn-orden" onclick="moverPlato(${p.id}, 'bajar')">▼</button>
                    </div>
                    <div class="plato-info">
                        <span class="plato-nombre">${nombreLimpio}</span>
                        <div class="info-pc-extra">${htmlCarpetaPC} ${htmlImagenPC}</div>
                    </div>
                    <div class="plato-meta-footer">
                        <div class="meta-left"><small>ID ${p.id} | ${p.precio}€</small></div>
                        <div class="meta-right">
                            <button class="btn-config" onclick="abrirEditor(${p.id})">⚙️</button>
                            <label class="switch"><input type="checkbox" ${p.activa?'checked':''} onchange="toggleActivo(${p.id},this.checked)"><span class="slider"></span></label>
                        </div>
                    </div>
                </div>`;
            });
            h += `</div>`;
        });
        document.getElementById('editor-dinamico').innerHTML = h;
    }

    function moverPlato(id, direccion) {
        const idx = datosLocales.findIndex(x => x.id === id);
        if (direccion === 'subir' && idx > 0) {
            const temp = datosLocales[idx].id;
            datosLocales[idx].id = datosLocales[idx-1].id;
            datosLocales[idx-1].id = temp;
        } else if (direccion === 'bajar' && idx < datosLocales.length - 1) {
            const temp = datosLocales[idx].id;
            datosLocales[idx].id = datosLocales[idx+1].id;
            datosLocales[idx+1].id = temp;
        }
        renderizar();
    }

    function abrirEditor(id, esNuevo = false) {
        let p = esNuevo ? datosTempNuevo : datosLocales.find(x => x.id === id);
        esNuevoPlato = esNuevo;
        platoEditandoId = id;
        const esVino = (id >= 13000);
        document.getElementById('label-uvas').innerText = esVino ? "Nombres y Uvas (Uvas solo para Vinos)" : "Nombres";
        const langs = ['es', 'en', 'de', 'fr', 'it'];
        langs.forEach(l => {
            const data = desglosarNombre(p[l] || "");
            document.getElementById(`edit-${l}`).value = data.nombre;
            const inputUva = document.getElementById(`edit-${l}-uvas`);
            inputUva.value = data.uvas;
            inputUva.style.display = esVino ? "block" : "none";
        });
        document.getElementById('edit-precio').value = p.precio;
        document.getElementById('edit-imagen').value = p.imagen;
        const actuales = (p.alergenos || "").split(',').map(s => s.trim().toUpperCase());
        document.getElementById('alergenos-grid').innerHTML = ALERGENOS_LISTA.map(a => {
            const sel = actuales.includes(a) ? 'selected' : '';
            return `<div class="alergeno-btn ${sel}" onclick="this.classList.toggle('selected')">${a}</div>`;
        }).join('');
        document.getElementById('modal-editor').style.display = 'block';
    }

    function aplicarCambiosPlato() {
        let p = esNuevoPlato ? datosTempNuevo : datosLocales.find(x => x.id === platoEditandoId);
        if(esNuevoPlato) datosLocales.push(p);
        const langs = ['es', 'en', 'de', 'fr', 'it'];
        langs.forEach(l => {
            const nom = superLimpiar(document.getElementById(`edit-${l}`).value);
            const inputUva = document.getElementById(`edit-${l}-uvas`);
            const uvas = inputUva.style.display !== "none" ? superLimpiar(inputUva.value) : "";
            p[l] = uvas ? `${nom} // ${uvas}` : nom;
        });
        p.precio = parseFloat(document.getElementById('edit-precio').value || 0).toFixed(2);
        p.imagen = superLimpiar(document.getElementById('edit-imagen').value);
        p.alergenos = Array.from(document.querySelectorAll('.alergeno-btn.selected')).map(el => el.innerText).join(', ');
        cerrarModal('modal-editor');
        renderizar();
    }

    function generarMenuAgrupado() {
        let h = "";
        ESTRUCTURA.forEach(cat => {
            h += `<div style="margin-bottom:10px;"><div style="background:#eee;padding:5px;font-size:0.7rem;">${cat.name}</div>`;
            if (cat.sub) {
                cat.sub.forEach(s => {
                    h += `<button onclick="prepararNuevoPlato(${s.id}, '${s.folder}')" style="width:100%;text-align:left;padding:10px;background:white;border:1px solid #ddd;">+ ${s.name}</button>`;
                });
            } else {
                h += `<button onclick="prepararNuevoPlato(${cat.id}, '${cat.folder||''}')" style="width:100%;text-align:left;padding:10px;background:white;border:1px solid #ddd;">+ ${cat.name}</button>`;
            }
            h += `</div>`;
        });
        document.getElementById('lista-agrupada').innerHTML = h;
    }

    function prepararNuevoPlato(baseId, folder) {
        // Buscamos el límite máximo definido en la estructura para esta subcategoría
        let maxPermitido = baseId + 99;
        ESTRUCTURA.forEach(cat => {
            if(cat.sub) {
                const sub = cat.sub.find(s => s.id === baseId);
                if(sub && sub.max) maxPermitido = sub.max;
            }
        });

        // Solo buscamos platos similares dentro del rango estricto de la subcategoría
        const similares = datosLocales.filter(p => p.id >= baseId && p.id <= maxPermitido);
        const nuevoId = similares.length > 0 ? Math.max(...similares.map(p => p.id)) + 1 : baseId;
        
        if(nuevoId > maxPermitido) {
            alert("Límite de IDs alcanzado para esta subcategoría.");
            return;
        }

        datosTempNuevo = { id: nuevoId, precio: "0.00", activa: true, es: "NUEVO", carpeta: folder, imagen: "", alergenos: "", en:"", de:"", fr:"", it:"" };
        cerrarModal('modal-selector');
        abrirEditor(nuevoId, true);
    }

    async function enviarAlExcel() {
        const btn = document.querySelector('.btn-guardar-main');
        btn.innerText = "⏳ SUBIENDO..."; btn.disabled = true;
        datosLocales.sort((a, b) => a.id - b.id);
        const payload = datosLocales.map(p => ({
            id: p.id, precio: p.precio, estado: p.activa ? 'si' : 'no', 
            nombre_es: p.es, carpeta: p.carpeta, imagen: p.imagen, alergenos: p.alergenos,
            nombre_en: p.en, nombre_de: p.de, nombre_fr: p.fr, nombre_it: p.it
        }));
        try {
            await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("✅ Guardado con éxito.");
            location.reload();
        } catch (e) { 
            alert("Error al guardar"); 
            btn.disabled = false; btn.innerText = "💾 GUARDAR"; 
        }
    }

    function toggleActivo(id, v) { datosLocales.find(x => x.id === id).activa = v; }
    function abrirSelector() { document.getElementById('modal-selector').style.display = 'block'; }
    function cerrarModal(id) { document.getElementById(id).style.display = 'none'; }
    cargar();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADMIN CARTA V 11.9.3 - MULTILINE FIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primario: #e67e22; --fondo: #f4f7f6; --texto: #2c3e50; --verde: #27ae60; }
        body { font-family: 'Montserrat', sans-serif; background: var(--fondo); margin: 0; padding: 10px 5px 140px; color: var(--texto); }
        .container { width: 100%; max-width: 1200px; margin: 0 auto; }
        .header-admin { text-align: center; background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-bottom: 4px solid var(--primario); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #status-carga { font-size: 0.75rem; padding: 8px; border-radius: 5px; margin-bottom: 10px; font-weight: bold; text-align: center; }
        .status-ok { background: #d4edda; color: #155724; }
        .categoria-tarjeta { background: white; border-radius: 12px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .categoria-titulo { background: var(--primario); color: white; padding: 10px 15px; font-weight: 700; text-transform: uppercase; font-size: 0.8rem; }
        .plato-item { display: flex; padding: 12px; border-bottom: 1px solid #f1f2f6; gap: 10px; align-items: center; }
        .plato-info { flex: 1; min-width: 0; }
        .plato-nombre { font-weight: 600; font-size: 0.9rem; display: block; overflow: hidden; text-overflow: ellipsis; white-space: pre-wrap; line-height: 1.3; }
        .plato-meta-footer { display: flex; align-items: center; gap: 15px; flex-shrink: 0; min-width: 150px; justify-content: flex-end; }
        .btn-config { background: #f8f9fa; border: 1px solid #ddd; border-radius: 6px; padding: 8px; cursor: pointer; }
        .btn-orden { background: #fff; border: 1px solid #ccc; border-radius: 4px; padding: 5px 8px; cursor: pointer; font-size: 1rem; }
        .btn-add-float { position: fixed; bottom: 85px; right: 20px; width: 60px; height: 60px; background: var(--primario); color: white; border-radius: 50%; border: none; font-size: 35px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1000; }
        .btn-guardar-main { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2c3e50; color: white; padding: 18px; border-radius: 50px; border: none; font-weight: 700; width: 90%; max-width: 450px; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); overflow-y: auto; }
        .modal-content { background: white; width: 96%; max-width: 800px; margin: 15px auto; border-radius: 15px; padding: 20px; box-sizing: border-box; }
        .input-estandar { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-family: 'Montserrat'; font-size: 1rem; box-sizing: border-box; margin-bottom: 10px; }
        textarea.input-estandar { min-height: 100px; resize: vertical; }
        .switch { position: relative; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--verde); }
        input:checked + .slider:before { transform: translateX(22px); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-admin">
        <h1>⚙️ GESTOR DE CARTA V 11.9.3</h1>
        <div id="status-carga">Cargando datos...</div>
    </div>
    <div id="editor-dinamico"></div>
</div>

<button class="btn-add-float" onclick="abrirSelector()">+</button>
<button class="btn-guardar-main" onclick="enviarAlExcel()">💾 GUARDAR CAMBIOS</button>

<div id="modal-editor" class="modal">
    <div class="modal-content">
        <h2 id="modal-titulo" style="color:var(--primario)">Editar Producto</h2>
        <label><small>Nombre y Descripción (Uvas)</small></label>
        <textarea id="edit-es" class="input-estandar" placeholder="Nombre ES + Uvas"></textarea>
        <textarea id="edit-en" class="input-estandar" placeholder="Nombre EN + Grapes"></textarea>
        <input type="number" id="edit-precio" class="input-estandar" step="0.01" placeholder="Precio">
        <div style="margin-top: 20px; display: flex; gap: 10px;">
            <button onclick="aplicarCambiosPlato()" style="flex:2; background:var(--verde); color:white; padding:15px; border:none; border-radius:10px; font-weight:bold;">ACEPTAR</button>
            <button onclick="cerrarModal('modal-editor')" style="flex:1; background:#eee; padding:15px; border:none; border-radius:10px;">CANCELAR</button>
        </div>
    </div>
</div>

<div id="modal-selector" class="modal">
    <div class="modal-content" style="max-width: 400px;">
        <h3>Añadir a...</h3>
        <div id="lista-agrupada"></div>
        <button onclick="cerrarModal('modal-selector')" style="width:100%; margin-top:10px; padding:10px;">CERRAR</button>
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT9rPlxpax2lE0rN97c6Hoy_OxUwREqRb48juEBr9C91ZFY2UvaKgC8JdiRcwDrtBErXFVmFRh0Zr5e/pub?gid=0&single=true&output=csv';
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbz2wu6B0m-QWZLqDRXhWcONg0Lta3uhTDOXq1lly43p5XKC7uvReeT6HcfC8K0LTLusTA/exec';

    let datosLocales = [];
    let platoEditandoId = null;

    const ESTRUCTURA = [
        { id: 12000, name: "Sugerencias", range: 999 },
        { id: 1000, name: "1- Entrantes", range: 999 },
        { id: 2000, name: "2- Ensaladas", range: 999 },
        { id: 3000, name: "3- Arroz y Pasta", range: 999 },
        { id: 4000, name: "4- Recetas", range: 999 },
        { id: 5000, name: "5- Platos principales", range: 999 },
        { id: 8000, name: "8- Postres", range: 999 },
        { id: 10000, name: "10- Bebidas", range: 999 },
        { id: 11000, name: "11- Cervezas", range: 999 },
        { id: 13100, name: "13.1 Vinos Blancos", range: 99 },
        { id: 13200, name: "13.2 Vinos Rosados", range: 99 },
        { id: 13300, name: "13.3 Vinos Tintos", range: 99 },
        { id: 13400, name: "13.4 Cavas & Champagne", range: 99 }
    ];

    // PARSER AVANZADO: Detecta saltos de línea dentro de comillas
    function parseCSV(text) {
        const rows = [];
        let row = [];
        let field = '';
        let inQuotes = false;
        for (let i = 0; i < text.length; i++) {
            const char = text[i];
            const nextChar = text[i+1];
            if (char === '"' && inQuotes && nextChar === '"') { field += '"'; i++; }
            else if (char === '"') { inQuotes = !inQuotes; }
            else if (char === ',' && !inQuotes) { row.push(field); field = ''; }
            else if ((char === '\r' || char === '\n') && !inQuotes) {
                if (field || row.length > 0) {
                    row.push(field);
                    rows.push(row);
                }
                field = ''; row = [];
                if (char === '\r' && nextChar === '\n') i++;
            } else { field += char; }
        }
        if (field || row.length > 0) { row.push(field); rows.push(row); }
        return rows;
    }

    async function cargar() {
        try {
            const resp = await fetch(CSV_URL + '&t=' + Date.now());
            const rawText = await resp.text();
            const filas = parseCSV(rawText);
            
            datosLocales = [];
            filas.forEach((c, i) => {
                if (i === 0 || !c[0]) return;
                const id = parseInt(c[0]);
                if (!isNaN(id)) {
                    datosLocales.push({
                        id: id, precio: c[1]||"0.00", 
                        activa: (c[2]||"").trim().toUpperCase() === "SI",
                        es: c[3]||"", carpeta: c[4]||"", imagen: c[5]||"",
                        alergenos: c[6]||"", en: c[7]||"", 
                        de: c[8]||"", fr: c[9]||"", it: c[10]||""
                    });
                }
            });
            document.getElementById('status-carga').innerText = "✅ Sincronizado";
            renderizar();
            generarMenuAgrupado();
        } catch (e) { document.getElementById('status-carga').innerText = "❌ Error Carga"; }
    }

    function renderizar() {
        let h = "";
        datosLocales.sort((a,b) => a.id - b.id);
        ESTRUCTURA.forEach(cat => {
            const platos = datosLocales.filter(p => p.id >= cat.id && p.id <= (cat.id + cat.range));
            if (platos.length === 0) return;
            h += `<div class="categoria-tarjeta"><div class="categoria-titulo">${cat.name}</div>`;
            platos.forEach(p => {
                h += `<div class="plato-item">
                    <div style="display:flex;flex-direction:column;gap:4px;">
                        <button class="btn-orden" onclick="mover(${p.id},'subir')">▲</button>
                        <button class="btn-orden" onclick="mover(${p.id},'bajar')">▼</button>
                    </div>
                    <div class="plato-info">
                        <span class="plato-nombre">${p.es}</span>
                    </div>
                    <div class="plato-meta-footer">
                        <small><b>${p.precio}€</b></small>
                        <button class="btn-config" onclick="abrirEditor(${p.id})">⚙️</button>
                        <label class="switch"><input type="checkbox" ${p.activa?'checked':''} onchange="toggle(${p.id},this.checked)"><span class="slider"></span></label>
                    </div>
                </div>`;
            });
            h += `</div>`;
        });
        document.getElementById('editor-dinamico').innerHTML = h;
    }

    function mover(id, dir) {
        const idx = datosLocales.findIndex(x => x.id === id);
        if(dir==='subir' && idx > 0) {
            let temp = datosLocales[idx].id;
            datosLocales[idx].id = datosLocales[idx-1].id;
            datosLocales[idx-1].id = temp;
        } else if(dir==='bajar' && idx < datosLocales.length-1) {
            let temp = datosLocales[idx].id;
            datosLocales[idx].id = datosLocales[idx+1].id;
            datosLocales[idx+1].id = temp;
        }
        renderizar();
    }

    function abrirEditor(id) {
        platoEditandoId = id;
        const p = datosLocales.find(x => x.id === id);
        document.getElementById('edit-es').value = p.es;
        document.getElementById('edit-en').value = p.en;
        document.getElementById('edit-precio').value = p.precio;
        document.getElementById('modal-editor').style.display = 'block';
    }

    function aplicarCambiosPlato() {
        const p = datosLocales.find(x => x.id === platoEditandoId);
        p.es = document.getElementById('edit-es').value;
        p.en = document.getElementById('edit-en').value;
        p.precio = document.getElementById('edit-precio').value;
        cerrarModal('modal-editor');
        renderizar();
    }

    async function enviarAlExcel() {
        const btn = document.querySelector('.btn-guardar-main');
        btn.innerText = "⏳ PROCESANDO..."; btn.disabled = true;
        datosLocales.sort((a,b) => a.id - b.id);
        
        const payload = datosLocales.map(p => ({
            id: p.id,
            precio: p.precio.toString(),
            estado: p.activa ? 'si' : 'no',
            nombre_es: p.es, // El script de Google manejará las comillas
            carpeta: p.carpeta,
            imagen: p.imagen,
            alergenos: p.alergenos,
            nombre_en: p.en,
            nombre_de: p.de,
            nombre_fr: p.fr,
            nombre_it: p.it
        }));

        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
            alert("✅ Guardado Correctamente");
            location.reload();
        } catch (e) {
            alert("Error al enviar");
            btn.disabled = false;
        }
    }

    function generarMenuAgrupado() {
        document.getElementById('lista-agrupada').innerHTML = ESTRUCTURA.map(cat => 
            `<button onclick="crearNuevo(${cat.id})" style="width:100%;padding:10px;margin:2px;">+ ${cat.name}</button>`
        ).join('');
    }

    function crearNuevo(baseId) {
        const nuevoId = Math.max(...datosLocales.filter(p => p.id >= baseId && p.id <= baseId+99).map(p=>p.id), baseId-1) + 1;
        datosLocales.push({id: nuevoId, precio:"0.00", activa:true, es:"NUEVO\nUvas:", carpeta:"vinos", imagen:"", alergenos:"", en:"NEW\nGrapes:", de:"", fr:"", it:""});
        cerrarModal('modal-selector');
        renderizar();
    }

    function toggle(id, v) { datosLocales.find(x => x.id === id).activa = v; }
    function cerrarModal(id) { document.getElementById(id).style.display = 'none'; }
    function abrirSelector() { document.getElementById('modal-selector').style.display = 'block'; }

    cargar();
</script>
</body>
</html>
